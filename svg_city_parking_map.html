*{box-sizing:border-box;margin:0;padding:0}
#shell{display:flex;height:720px;font-family:var(--font-sans)}

#map-svg{width:100%;height:100%;cursor:grab;display:block}

#sidebar{width:220px;flex-shrink:0;background:var(--color-background-primary);border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;padding:18px 15px;gap:11px;overflow-y:auto}

#findbtn:hover{background:#b5d4f4}
#clearbtn{width:100%;padding:7px;font-size:12px;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;cursor:pointer}

#infobox{background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--color-text-secondary);line-height:1.7;min-height:58px}
.leg{display:flex;flex-direction:column;gap:6px}

.ld{width:16px;height:10px;border-radius:3px;flex-shrink:0}
#nomsg{font-size:12px;color:#b02020;font-weight:500;display:none}
.spot-el{cursor:pointer;transition:opacity .3s}

// State
let spots = SPOT_DEFS.map(s=>({...s, available: Math.random()>0.44}));
let selectedId = null;
let pathEl = null;

const spotsLayer = document.getElementById('spots-layer');
const pathLayer = document.getElementById('path-layer');
const tooltip = document.getElementById('tooltip');
const ttBg = document.getElementById('tt-bg');
const ttName = document.getElementById('tt-name');
const ttStatus = document.getElementById('tt-status');
const ttArrow = document.getElementById('tt-arrow');

// User position (center of "You" marker)
const USER = {x: 185, y: 559};

function updateSidebar(){
  const a = spots.filter(s=>s.available).length;
  document.getElementById('s-total').textContent = spots.length;
  document.getElementById('s-avail').textContent = a;
  document.getElementById('s-occ').textContent = spots.length - a;
}

function showTooltip(spot) {
  const cx = spot.x + spot.w/2;
  const cy = spot.y;
  const tw = 88, th = 36;
  const tx = cx - tw/2;
  const ty = cy - th - 8;
  ttBg.setAttribute('x', tx); ttBg.setAttribute('y', ty);
  ttBg.setAttribute('width', tw); ttBg.setAttribute('height', th);
  ttName.setAttribute('x', tx+8); ttName.setAttribute('y', ty+14);
  ttName.textContent = 'Spot ' + spot.label;
  ttStatus.setAttribute('x', tx+8); ttStatus.setAttribute('y', ty+27);
  ttStatus.textContent = spot.available ? 'Available' : 'Occupied';
  ttStatus.setAttribute('fill', spot.available ? '#7ecf60' : '#f08080');
  const arrowCx = cx;
  ttArrow.setAttribute('points', `${arrowCx-4},${ty+th} ${arrowCx+4},${ty+th} ${arrowCx},${ty+th+6}`);
  tooltip.setAttribute('opacity','1');
}
function hideTooltip(){ tooltip.setAttribute('opacity','0'); }

function drawSpots(){
  spotsLayer.innerHTML = '';
  spots.forEach(s=>{
    const col = s.available ? '#2d7a1f' : '#b02020';
    const g = document.createElementNS(NS,'g');
    g.setAttribute('class','spot-el');
    g.setAttribute('data-id', s.id);

    // White parking stripe backing
    const bg = document.createElementNS(NS,'rect');
    bg.setAttribute('x', s.x-1); bg.setAttribute('y', s.y-1);
    bg.setAttribute('width', s.w+2); bg.setAttribute('height', s.h+2);
    bg.setAttribute('rx', s.rx+1); bg.setAttribute('fill','#fff');
    bg.setAttribute('opacity','0.4');
    g.appendChild(bg);

    const r = document.createElementNS(NS,'rect');
    r.setAttribute('x', s.x); r.setAttribute('y', s.y);
    r.setAttribute('width', s.w); r.setAttribute('height', s.h);
    r.setAttribute('rx', s.rx);
    r.setAttribute('fill', col);
    r.style.transition = 'fill 0.5s ease';

    // Selected ring
    if(selectedId === s.id){
      const ring = document.createElementNS(NS,'rect');
      ring.setAttribute('x', s.x-3); ring.setAttribute('y', s.y-3);
      ring.setAttribute('width', s.w+6); ring.setAttribute('height', s.h+6);
      ring.setAttribute('rx', s.rx+3);
      ring.setAttribute('fill','none');
      ring.setAttribute('stroke','#378ADD');
      ring.setAttribute('stroke-width','2.5');
      g.appendChild(ring);
    }
    g.appendChild(r);

    // P label
    const t = document.createElementNS(NS,'text');
    t.setAttribute('x', s.x + s.w/2);
    t.setAttribute('y', s.y + s.h/2 + 3.5);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','7');
    t.setAttribute('font-weight','500');
    t.setAttribute('fill','#fff');
    t.setAttribute('pointer-events','none');
    t.setAttribute('font-family','sans-serif');
    t.textContent = 'P';
    g.appendChild(t);

    g.addEventListener('click', ()=>handleSpotClick(s.id));
    g.addEventListener('mouseenter', ()=>showTooltip(s));
    g.addEventListener('mouseleave', hideTooltip);
    spotsLayer.appendChild(g);
  });
  // Move tooltip above spots
  svg.appendChild(tooltip);
  svg.appendChild(document.getElementById('user-marker'));
}

function handleSpotClick(id){
  selectedId = id;
  pathLayer.innerHTML = '';
  const s = spots.find(p=>p.id===id);
  document.getElementById('infobox').innerHTML =
    `<strong>Spot ${s.label}</strong><br>` +
    `Status: <span style="color:${s.available?'#2d7a1f':'#b02020'};font-weight:500">${s.available?'Available':'Occupied'}</span>`;
  document.getElementById('nomsg').style.display='none';
  drawSpots();
}

// BFS on road network modeled as graph nodes at spots + user
// Simple: compute Euclidean distance and draw straight SVG path only along roads
// True BFS: we use a waypoint road graph
// Road graph: all spots + user, edges exist if they share a road axis
const H_ROADS_Y = [140, 270, 420, 559]; // center y of horizontal roads
const V_ROADS_X = [185, 445, 635, 764]; // center x of vertical roads

function spotRoadCenter(s){
  // Get the road center (x or y) nearest to this spot
  const cx = s.x + s.w/2, cy = s.y + s.h/2;
  // Find nearest H road
  let bestH = H_ROADS_Y[0], dh = Infinity;
  H_ROADS_Y.forEach(y=>{ if(Math.abs(cy-y)<dh){dh=Math.abs(cy-y);bestH=y;} });
  // Find nearest V road
  let bestV = V_ROADS_X[0], dv = Infinity;
  V_ROADS_X.forEach(x=>{ if(Math.abs(cx-x)<dv){dv=Math.abs(cx-x);bestV=x;} });
  // Determine if H or V road is closer
  if(dh < dv) return {snapX: cx, snapY: bestH, roadType:'h', roadVal: bestH};
  return {snapX: bestV, snapY: cy, roadType:'v', roadVal: bestV};
}

function userRoadSnap(){
  return {snapX: USER.x, snapY: USER.y, roadType:'h', roadVal: USER.y};
}

// Build a realistic road path: go to road, travel along, turn, reach spot
function buildRoadPath(fromSnap, toSnap){
  // From fromSnap, navigate on roads to toSnap
  // Strategy: move along connecting roads via intersection waypoints
  const pts = [];
  const fx = fromSnap.snapX, fy = fromSnap.snapY;
  const tx = toSnap.snapX, ty = toSnap.snapY;

  pts.push({x:fx, y:fy});

  if(fromSnap.roadType === 'h'){
    // Travel horizontal to nearest V road that connects to target
    const targetVX = nearestVRoad(tx);
    if(Math.abs(fx - targetVX) > 5) pts.push({x:targetVX, y:fy});
    // Travel vertical to target road
    if(Math.abs(fy - ty) > 5) pts.push({x:targetVX, y:ty});
  } else {
    const targetHY = nearestHRoad(ty);
    if(Math.abs(fy - targetHY) > 5) pts.push({x:fx, y:targetHY});
    if(Math.abs(fx - tx) > 5) pts.push({x:tx, y:targetHY});
  }

  pts.push({x:tx, y:ty});
  return pts;
}

function nearestVRoad(x){
  let best=V_ROADS_X[0],d=Infinity;
  V_ROADS_X.forEach(vx=>{if(Math.abs(x-vx)<d){d=Math.abs(x-vx);best=vx;}});
  return best;
}
function nearestHRoad(y){
  let best=H_ROADS_Y[0],d=Infinity;
  H_ROADS_Y.forEach(hy=>{if(Math.abs(y-hy)<d){d=Math.abs(y-hy);best=hy;}});
  return best;
}

function pathDistance(fromSnap, toSnap){
  const pts = buildRoadPath(fromSnap, toSnap);
  let dist=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y;
    dist+=Math.sqrt(dx*dx+dy*dy);
  }
  return dist;
}

function drawRoadPath(pts){
  pathLayer.innerHTML='';
  if(pts.length<2) return;
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for(let i=1;i<pts.length;i++) d+=` L ${pts[i].x} ${pts[i].y}`;

  // Glow/shadow
  const shadow = document.createElementNS(NS,'path');
  shadow.setAttribute('d',d);
  shadow.setAttribute('fill','none');
  shadow.setAttribute('stroke','#0c447c');
  shadow.setAttribute('stroke-width','7');
  shadow.setAttribute('stroke-linecap','round');
  shadow.setAttribute('stroke-linejoin','round');
  shadow.setAttribute('opacity','0.3');
  pathLayer.appendChild(shadow);

  const line = document.createElementNS(NS,'path');
  line.setAttribute('d',d);
  line.setAttribute('fill','none');
  line.setAttribute('stroke','#378ADD');
  line.setAttribute('stroke-width','4');
  line.setAttribute('stroke-linecap','round');
  line.setAttribute('stroke-linejoin','round');
  line.setAttribute('stroke-dasharray','12,7');
  line.setAttribute('opacity','0.92');
  pathLayer.appendChild(line);

  // Animated dash
  const anim = document.createElementNS(NS,'animate');
  anim.setAttribute('attributeName','stroke-dashoffset');
  anim.setAttribute('from','0');
  anim.setAttribute('to','-19');
  anim.setAttribute('dur','0.6s');
  anim.setAttribute('repeatCount','indefinite');
  line.appendChild(anim);
}

function findBestParking(){
  const avail = spots.filter(s=>s.available);
  if(!avail.length){
    const nm = document.getElementById('nomsg');
    nm.textContent='No parking available.';
    nm.style.display='block';
    return;
  }
  document.getElementById('nomsg').style.display='none';

  const fromSnap = userRoadSnap();
  let bestSpot=null, bestDist=Infinity, bestPts=null;
  avail.forEach(s=>{
    const toSnap = spotRoadCenter(s);
    const d = pathDistance(fromSnap, toSnap);
    if(d<bestDist){bestDist=d;bestSpot=s;bestPts=buildRoadPath(fromSnap,toSnap);}
  });

  selectedId = bestSpot.id;
  drawSpots();
  drawRoadPath(bestPts);
  // Move path under user marker
  svg.insertBefore(pathLayer, document.getElementById('user-marker'));
  document.getElementById('infobox').innerHTML=
    `<strong>Best spot: ${bestSpot.label}</strong><br>` +
    `Road distance: ~${Math.round(bestDist)} px<br>` +
    `<span style="color:#2d7a1f;font-weight:500">Available</span>`;
}

function clearAll(){
  selectedId=null;
  pathLayer.innerHTML='';
  drawSpots();
  document.getElementById('infobox').textContent='Click a parking spot on the map.';
  document.getElementById('nomsg').style.display='none';
}

document.getElementById('findbtn').addEventListener('click', findBestParking);
document.getElementById('clearbtn').addEventListener('click', clearAll);

// Simulation: toggle 1-3 spots every 3s
setInterval(()=>{
  const n=1+Math.floor(Math.random()*2);
  const used=new Set();
  for(let i=0;i<n;i++){
    let idx; do{idx=Math.floor(Math.random()*spots.length);}while(used.has(idx));
    used.add(idx);
    spots[idx].available=!spots[idx].available;
  }
  drawSpots();
  updateSidebar();
  if(selectedId!==null){
    const s=spots.find(p=>p.id===selectedId);
    if(s){
      document.getElementById('infobox').innerHTML=
        `<strong>Spot ${s.label}</strong><br>` +
        `Status: <span style="color:${s.available?'#2d7a1f':'#b02020'};font-weight:500">${s.available?'Available':'Occupied'}</span>`;
    }
  }
},3000);

// Zoom + pan
let vx=0,vy=0,vw=900,vh=720;
let dragging=false,lastX=0,lastY=0;
const mapWrap = document.getElementById('map-container');

mapWrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const scale=e.deltaY<0?0.85:1/0.85;
  const rect=svg.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/rect.width*vw+vx;
  const my=(e.clientY-rect.top)/rect.height*vh+vy;
  vw*=scale; vh*=scale;
  vx=mx-(e.clientX-rect.left)/rect.width*vw;
  vy=my-(e.clientY-rect.top)/rect.height*vh;
  vw=Math.max(200,Math.min(1800,vw));
  vh=Math.max(160,Math.min(1440,vh));
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
},{passive:false});

svg.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{
  if(!dragging) return;
  const rect=svg.getBoundingClientRect();
  const dx=(e.clientX-lastX)/rect.width*vw;
  const dy=(e.clientY-lastY)/rect.height*vh;
  vx-=dx; vy-=dy; lastX=e.clientX; lastY=e.clientY;
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
});

// Initial
drawSpots();
updateSidebar();
</script>
